<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Parking - ParkIQ</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="search-container">
    <h1>Find Parking</h1>

    <!-- SOURCE -->
    <div class="autocomplete-box">
        <input type="text" id="sourceInput" placeholder="Enter Source Location">
        <div id="sourceSuggestions"></div>
    </div>

    <br>

    <!-- DESTINATION -->
    <div class="autocomplete-box">
        <input type="text" id="destinationInput" placeholder="Enter Destination">
        <div id="destinationSuggestions"></div>
    </div>

    <br>

    <button onclick="searchRoute()">Search Parking</button>

    <br><br>

    <button onclick="useGPS()">Use My Current Location</button>
</div>

<script>
let sourceSelected = "";
let destSelected = "";

// AUTOCOMPLETE FUNCTION
function setupAutocomplete(inputId, suggestionId) {
    document.getElementById(inputId).addEventListener("input", function () {
        let query = this.value.trim();

        if (query.length < 2) {
            document.getElementById(suggestionId).innerHTML = "";
            return;
        }

        fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`)
        .then(res => res.json())
        .then(data => {
            let html = "";

            data.slice(0,5).forEach(place => {
                html += `
                    <div class="suggestion-item"
                        onclick="selectLocation('${inputId}', '${suggestionId}', '${place.display_name.replace(/'/g, "\\'")}')">
                        ${place.display_name}
                    </div>
                `;
            });

            document.getElementById(suggestionId).innerHTML = html;
        });
    });
}

// SELECT LOCATION
function selectLocation(inputId, suggestionId, value) {
    document.getElementById(inputId).value = value;
    document.getElementById(suggestionId).innerHTML = "";

    if(inputId === "sourceInput"){
        sourceSelected = value;
        localStorage.setItem("source", value);
        localStorage.setItem("useGPS", "false");  // ❌ disable GPS
    } else {
        destSelected = value;
        localStorage.setItem("destination", value);
    }
}

// SEARCH
function searchRoute() {
    let source = document.getElementById("sourceInput").value.trim();
    let destination = document.getElementById("destinationInput").value.trim();

    if (source === "" || destination === "") {
        alert("Please enter both source and destination");
        return;
    }

    // store for next page
    localStorage.setItem("source", source);
    localStorage.setItem("destination", destination);
    localStorage.setItem("useGPS", "false");

    window.location.href =
        "/area_slots?source=" + encodeURIComponent(source) +
        "&destination=" + encodeURIComponent(destination);
}

// GPS
function useGPS() {
    navigator.geolocation.getCurrentPosition(function (position) {

        localStorage.setItem("useGPS", "true");  // ✅ enable GPS

        let lat = position.coords.latitude;
        let lon = position.coords.longitude;

        fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
        .then(res => res.json())
        .then(data => {
            document.getElementById("sourceInput").value = data.display_name;

            localStorage.setItem("source", data.display_name);
        });
    });
}

// INIT AUTOCOMPLETE
setupAutocomplete("sourceInput", "sourceSuggestions");
setupAutocomplete("destinationInput", "destinationSuggestions");

</script>

</body>
</html>
