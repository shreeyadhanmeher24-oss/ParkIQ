<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Successful - ParkIQ</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="success-container">
    <div class="success-card">

        <div class="checkmark">✅</div>

        <h1>Payment Successful!</h1>

        <p>Your parking slot has been booked successfully.</p>

        <h3>Payment ID:</h3>
        <p class="payment-id">{{ payment_id }}</p>

        <!-- Download Receipt Button -->
        <a href="/download_receipt/{{ payment_id }}">
            <button class="receipt-btn">Download Receipt PDF</button>
        </a>

        <br><br>

        

        <br><br>

        <!-- Back Home Button -->
        <a href="/">
            <button class="home-btn">Back Home</button>
        </a>

    </div>
</div>

<script>
setTimeout(function(){
    window.location.href = "/timer";
}, 2000);
</script>

</body>
</html>
