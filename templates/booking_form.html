<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Parking - ParkIQ</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.search-container {
    background: white;
    padding: 35px;
    border-radius: 16px;
    width: 400px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    color: #111;
}

/* TITLE FIXED */
.title {
    text-align: center;
    color: #1e293b;
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 25px;
}

/* LABELS */
label {
    font-weight: 600;
}

/* INPUTS */
input, select {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: 1px solid #ccc;
    outline: none;
    font-size: 14px;
}

/* FOCUS EFFECT */
input:focus, select:focus {
    border-color: #2563eb;
    box-shadow: 0 0 0 2px rgba(37,99,235,0.2);
}

/* PRICE */
#priceDisplay {
    text-align: center;
    color: #16a34a;
    font-size: 22px;
    font-weight: bold;
    margin: 15px 0;
}

/* BUTTON */
button {
    width: 100%;
    padding: 14px;
    background: #22c55e;
    border: none;
    border-radius: 12px;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #16a34a;
}
</style>
</head>

<body>

<div class="search-container">
    <h1 class="title">🚗 Book Parking Slot</h1>

    <form action="/confirm_booking" method="POST">

        <label>Vehicle Number Plate</label>
        <input type="text" name="vehicle_number" placeholder="e.g. MH12AB1234" required>

        <label>Vehicle Type</label>
        <select name="vehicle_type" id="vehicle_type" onchange="calculatePrice()" required>
            <option value="">Select Vehicle Type</option>
            <option value="2">2 Wheeler</option>
            <option value="4">4 Wheeler</option>
        </select>

        <label>Parking Duration</label>
        <select name="duration" id="duration" onchange="calculatePrice()" required>
            <option value="">Select Duration</option>
            <option value="1">30 Minutes</option>
            <option value="2">1 Hour</option>
            <option value="4">2 Hours</option>
        </select>

        <h2 id="priceDisplay">Price: ₹0</h2>

        <input type="hidden" name="price" id="priceInput" value="0">

        <button type="submit">Continue to Payment</button>
    </form>
</div>

<script>
function calculatePrice() {
    let vehicleType = document.getElementById("vehicle_type").value;
    let duration = document.getElementById("duration").value;

    let price = 0;

    if (vehicleType && duration) {
        if (vehicleType === "2") {
            price = parseInt(duration) * 10;
        } else if (vehicleType === "4") {
            price = parseInt(duration) * 20;
        }
    }

    document.getElementById("priceDisplay").innerText = "Price: ₹" + price;
    document.getElementById("priceInput").value = price;
}
</script>

</body>
</html>
