<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - ParkIQ</title>
</head>
<body>

<h1>Admin Dashboard</h1>

<table border="1">
<tr>
<th>ID</th>
<th>Slot</th>
<th>Status</th>
</tr>

{% for slot in slots %}
<tr>
<td>{{ slot[0] }}</td>
<td>{{ slot[1] }}</td>
<td>{{ slot[2] }}</td>
</tr>
{% endfor %}
</table>

</body>
</html>
