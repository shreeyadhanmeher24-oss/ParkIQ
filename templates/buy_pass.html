<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buy Monthly Pass - ParkIQ</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Card */
.container {
    background: white;
    padding: 40px;
    border-radius: 16px;
    width: 420px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
}

/* Title */
h1 {
    text-align: center;
    margin-bottom: 25px;
}

/* Labels */
label {
    font-weight: 600;
    display: block;
    margin-bottom: 8px;
    color: #333;
}

/* Inputs */
input, select {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
    margin-bottom: 20px;
    font-size: 14px;
    outline: none;
}

input:focus, select:focus {
    border-color: #22c55e;
    box-shadow: 0 0 5px rgba(34,197,94,0.4);
}

/* Button */
.btn {
    width: 100%;
    padding: 14px;
    background: #22c55e;
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
}

.btn:hover {
    background: #16a34a;
}

/* Back button */
.back {
    margin-top: 15px;
    width: 100%;
    padding: 12px;
    background: #64748b;
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
}

.back:hover {
    background: #475569;
}

/* Price tag */
.price {
    text-align: center;
    font-size: 18px;
    font-weight: bold;
    margin: 15px 0;
    color: #16a34a;
}
</style>

</head>
<body>

<div class="container">
    <h1>🚗 Buy Monthly Pass</h1>

    <form method="POST" action="/create_pass_payment">

        <label>Vehicle Number</label>
        <input type="text" name="vehicle_number" placeholder="Enter Vehicle Number" required>

        <label>Vehicle Type</label>
        <select name="vehicle_type" required>
            <option value="">Select Vehicle</option>
            <option value="2">2 Wheeler</option>
            <option value="4">4 Wheeler</option>
        </select>

        <div class="price">₹500 / Month</div>

        <button type="submit" class="btn">Pay & Activate Pass</button>
    </form>

    <a href="/dashboard">
        <button class="back">Back to Dashboard</button>
    </a>
</div>

</body>
</html>
