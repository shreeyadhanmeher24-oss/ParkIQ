<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Parking Pass</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<style>
body {
    background: #f5f7fa;
    font-family: 'Segoe UI', sans-serif;
}

/* PASS CARD */
.pass-card {
    max-width: 380px;
    margin: 60px auto 30px;
    padding: 30px;
    border-radius: 18px;
    background: white;
    box-shadow: 0 15px 40px rgba(0,0,0,0.1);
    text-align: left;
    position: relative;
    overflow: hidden;
}

/* top stripe */
.pass-card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    height: 6px;
    width: 100%;
    background: linear-gradient(90deg, #00c853, #00e676);
}

/* title */
.pass-title {
    text-align: center;
    margin-bottom: 20px;
}

.pass-title h2 {
    margin: 5px 0;
    font-size: 26px;
}

.pass-title span {
    color: #00c853;
    font-weight: bold;
}

/* details */
.pass-info p {
    margin: 10px 0;
    font-size: 15px;
    color: #333;
}

.pass-info strong {
    color: #555;
}

/* status */
.status {
    margin-top: 15px;
    font-weight: bold;
}

.active {
    color: #00c853;
}

.expired {
    color: #ff3b3b;
}

/* buttons */
.btn-container {
    text-align: center;
    margin-top: 20px;
}

.btn {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    margin: 5px;
    font-size: 14px;
    cursor: pointer;
    transition: 0.3s;
}

/* primary button */
.btn-primary {
    background: #00c853;
    color: white;
}

.btn-primary:hover {
    background: #00a844;
}

/* secondary button */
.btn-secondary {
    background: #e0e0e0;
}

.btn-secondary:hover {
    background: #c7c7c7;
}
</style>

</head>
<body>

<div class="pass-card">

    <div class="pass-title">
        <h2>🚗 ParkIQ</h2>
        <span>Monthly Parking Pass</span>
    </div>

    <div class="pass-info">
        <p><strong>User:</strong> {{ username }}</p>
        <p><strong>Vehicle:</strong> {{ vehicle_number }}</p>
        <p><strong>Type:</strong> {{ vehicle_type }} Wheeler</p>
        <p><strong>Valid Till:</strong> {{ expiry }}</p>

        <p class="status">
            <strong>Status:</strong> 
            <span class="{{ 'active' if status == 'Active' else 'expired' }}">
                {{ status }}
            </span>
        </p>
    </div>

</div>

<div class="btn-container">
    <a href="/dashboard">
        <button class="btn btn-primary">Go to Dashboard</button>
    </a>

    <a href="/">
        <button class="btn btn-secondary">Back Home</button>
    </a>
</div>

</body>
</html>
